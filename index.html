<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 0.75rem;
    gap: 0.75rem;
  }
  .img-section {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #ddd;
    padding: 0.75rem;
  }
  .img-label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
  }
  .img-section img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }
  .compass-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 1.25rem;
  }
  .compass-wrap {
    position: relative;
    width: 140px;
    height: 140px;
  }
  .ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid #ddd;
    position: absolute;
    background: #fafafa;
  }
  .disc {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    transition: transform 0.12s ease-out;
    will-change: transform;
  }
  .disc svg { width: 100%; height: 100%; }
  .needle {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 8px; height: 8px;
    background: #333;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .heading {
    font-size: 2.4rem;
    font-weight: 700;
    color: #111;
    letter-spacing: -1px;
    line-height: 1;
  }
  .cardinal {
    font-size: 1rem;
    color: #888;
  }
  #notice {
    font-size: 0.72rem;
    color: #aaa;
    text-align: center;
  }
  #notice.error { color: #e04040; }
  #permitBtn {
    font-size: 0.8rem;
    padding: 8px 20px;
    border: 1px solid #ccc;
    border-radius: 20px;
    background: #fff;
    cursor: pointer;
    display: none;
    color: #333;
  }
</style>
</head>
<body>

  <div class="img-section">
    <div class="img-label">
      <span>↑</span>
      <span>West</span>
    </div>
    <img src="https://drive.google.com/thumbnail?id=1TzqLOuaK0nFdZsCEl3dDIJHV6jhB7Hev&sz=w1200" alt="Map" />
  </div>

  <div class="compass-section">
    <div class="compass-wrap">
      <div class="ring"></div>
      <div class="disc" id="disc">
        <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <text x="80" y="22" text-anchor="middle" fill="#e04040" font-family="system-ui" font-size="14" font-weight="700">N</text>
          <text x="80" y="153" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="12">S</text>
          <text x="152" y="85" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="12">E</text>
          <text x="8" y="85" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="12">W</text>
        </svg>
      </div>
      <div class="needle">
        <svg width="24" height="80" viewBox="0 0 24 80">
          <polygon points="12,4 17,40 12,36 7,40" fill="#e04040"/>
          <polygon points="12,76 17,40 12,44 7,40" fill="#ccc"/>
        </svg>
      </div>
      <div class="dot"></div>
    </div>
    <div class="heading" id="direction">--°</div>
    <div class="cardinal" id="cardinal">--</div>
    <div id="notice">Waiting for sensor…</div>
    <button id="permitBtn" onclick="requestIOSPermission()">Enable Compass</button>
  </div>

<script>
  const disc       = document.getElementById('disc');
  const dirEl      = document.getElementById('direction');
  const noticeEl   = document.getElementById('notice');
  const cardinalEl = document.getElementById('cardinal');
  const permitBtn  = document.getElementById('permitBtn');

  function toCardinal(d) {
    return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d / 22.5) % 16];
  }

  function handleOrientation(e) {
    if (e.alpha === null) { noticeEl.textContent = 'No compass data available.'; return; }
    const heading = (360 - e.alpha) % 360;
    disc.style.transform = `rotate(${-e.alpha}deg)`;
    dirEl.textContent      = Math.round(heading) + '°';
    cardinalEl.textContent = toCardinal(heading);
    noticeEl.textContent   = 'Hold device flat for best accuracy.';
  }

  function startListening() {
    if (!window.DeviceOrientationEvent) {
      noticeEl.textContent = 'Not supported by this browser.';
      noticeEl.className = 'error';
      return;
    }
    window.addEventListener('deviceorientation', handleOrientation, true);
  }

  function requestIOSPermission() {
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') { permitBtn.style.display = 'none'; startListening(); }
        else { noticeEl.textContent = 'Permission denied.'; noticeEl.className = 'error'; }
      })
      .catch(err => { noticeEl.textContent = err.message; noticeEl.className = 'error'; });
  }

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    noticeEl.textContent = 'Tap to enable the compass.';
    permitBtn.style.display = 'inline-block';
  } else {
    startListening();
  }
</script>
</body>
</html>
