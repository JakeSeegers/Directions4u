
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Compass</title>
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 1rem;
    gap: 1rem;
  }

  /* Big directional banner */
  .heading-banner {
    background: #1b5e20;
    color: #fff;
    border-radius: 14px;
    padding: 1.5rem 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .heading-banner .arrow {
    font-size: 4rem;
    line-height: 1;
    font-weight: 700;
  }
  .heading-banner .word {
    font-size: 3.5rem;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  /* Map image */
  .img-section {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #ddd;
    padding: 0.75rem;
  }
  .img-section img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 6px;
  }

  /* Compass */
  .compass-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 1.75rem 1rem;
  }
  .compass-wrap {
    position: relative;
    width: 300px;
    height: 300px;
    max-width: 90vw;
    max-height: 90vw;
  }
  .ring {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid #ccc;
    position: absolute;
    background: #fafafa;
  }
  .disc {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    transition: transform 0.12s ease-out;
    will-change: transform;
  }
  .disc svg { width: 100%; height: 100%; }
  .needle {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .needle svg { width: 45px; height: 150px; }
  .dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 14px; height: 14px;
    background: #333;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .cardinal-display {
    font-size: 3rem;
    font-weight: 800;
    color: #111;
    letter-spacing: 0.05em;
    background: #f0f0f0;
    border-radius: 12px;
    padding: 10px 40px;
    min-width: 140px;
    text-align: center;
  }
  #notice {
    font-size: 1rem;
    color: #888;
    text-align: center;
  }
  #notice.error { color: #e04040; }
  #permitBtn {
    font-size: 1.3rem;
    font-weight: 600;
    padding: 16px 36px;
    border: 2px solid #1b5e20;
    border-radius: 30px;
    background: #1b5e20;
    color: #fff;
    cursor: pointer;
    display: none;
  }

  /* QR image */
  .qr-section {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #ddd;
    padding: 0.75rem;
    display: flex;
    justify-content: center;
  }
  .qr-section img {
    width: 100%;
    max-width: 260px;
    height: auto;
    display: block;
    border-radius: 6px;
  }
</style>
</head>
<body>

  <!-- Big directional banner -->
  <div class="heading-banner">
    <span class="arrow">&#8593;</span>
    <span class="word">Map West</span>
  </div>

  <!-- Map -->
  <div class="img-section">
    <img src="https://drive.google.com/thumbnail?id=1TzqLOuaK0nFdZsCEl3dDIJHV6jhB7Hev&sz=w1200" alt="Map" />
  </div>

  <!-- Compass -->
  <div class="compass-section">
    <div class="compass-wrap">
      <div class="ring"></div>
      <div class="disc" id="disc">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <text x="100" y="34" text-anchor="middle" fill="#e04040" font-family="system-ui" font-size="32" font-weight="800">N</text>
          <text x="100" y="190" text-anchor="middle" fill="#444" font-family="system-ui" font-size="28" font-weight="700">S</text>
          <text x="180" y="111" text-anchor="middle" fill="#444" font-family="system-ui" font-size="28" font-weight="700">E</text>
          <text x="20" y="111" text-anchor="middle" fill="#444" font-family="system-ui" font-size="28" font-weight="700">W</text>
        </svg>
      </div>
      <div class="needle">
        <svg viewBox="0 0 30 100">
          <polygon points="15,4 21,50 15,44 9,50" fill="#e04040"/>
          <polygon points="15,96 21,50 15,56 9,50" fill="#ccc"/>
        </svg>
      </div>
      <div class="dot"></div>
    </div>
    <div class="cardinal-display" id="cardinal">--</div>
    <div id="notice">Waiting for sensor&hellip;</div>
    <button id="permitBtn" onclick="requestIOSPermission()">Enable Compass</button>
  </div>

  <!-- QR Code -->
  <div class="qr-section">
    <img src="https://drive.google.com/thumbnail?id=1CJBjd7M689JgXV1c_vT2jS7qZPf3vxlB&sz=w600" alt="QR Code" />
  </div>

<script>
  const disc       = document.getElementById('disc');
  const noticeEl   = document.getElementById('notice');
  const cardinalEl = document.getElementById('cardinal');
  const permitBtn  = document.getElementById('permitBtn');

  function toCardinal(d) {
    return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d / 22.5) % 16];
  }

  function handleOrientation(e) {
    // Prefer a true magnetic heading when the device provides one.
    // iOS exposes webkitCompassHeading (0 = true north, increases clockwise).
    // Plain `alpha` is often relative — it treats whatever direction the
    // device faced at sensor start as 0 — so we only fall back to it.
    let heading;
    if (typeof e.webkitCompassHeading === 'number') {
      heading = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
      // alpha increases counter-clockwise, so convert to a clockwise heading.
      heading = (360 - e.alpha) % 360;
    } else {
      noticeEl.textContent = 'No compass data available.';
      return;
    }
    // Disc rotates so its N points at true north; readout matches the face.
    disc.style.transform = `rotate(${-heading}deg)`;
    cardinalEl.textContent = toCardinal(heading);
    noticeEl.textContent   = 'Hold device flat for best accuracy.';
  }

  function startListening() {
    if (!window.DeviceOrientationEvent) {
      noticeEl.textContent = 'Not supported by this browser.';
      noticeEl.className = 'error';
      return;
    }
    // Android Chrome provides an absolute (true-north) heading via this event.
    if ('ondeviceorientationabsolute' in window) {
      window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    } else {
      window.addEventListener('deviceorientation', handleOrientation, true);
    }
  }

  function requestIOSPermission() {
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') { permitBtn.style.display = 'none'; startListening(); }
        else { noticeEl.textContent = 'Permission denied.'; noticeEl.className = 'error'; }
      })
      .catch(err => { noticeEl.textContent = err.message; noticeEl.className = 'error'; });
  }

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    noticeEl.textContent = 'Tap to enable the compass.';
    permitBtn.style.display = 'inline-block';
  } else {
    startListening();
  }
</script>
</body>
</html>
